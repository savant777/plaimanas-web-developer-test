<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <!-- overlay : start -->
    <div class="pmn-overlay"></div>
    <!-- overlay : end -->
    <!-- top navigation : start -->
    <nav id="topNav" class="pmn-nav">
        <!-- select Language : start -->
        <div id="menuLang" class="pmn-select">
            <button class="pmn-select-button">
                <span class="pmn-selected-value"></span>
                <span class="arrow"></span>
            </button>
            <ul class="pmn-select-dropdown hidden">
                <li class="selected">TH - THB</li>
                <li class="">US - USD</li>
            </ul>
        </div>
        <!-- select Language : end -->
        <!-- toggle menu button : start -->
        <button class="pmn-burger" aria-label="Toggle menu">
            <span class="line"></span>
            <span class="line"></span>
        </button>
        <!-- toggle menu button : end -->
        <!-- menu : start -->
        <div class="pmn-menu-container">
            <ul id="menuList" class="pmn-menu-links">
                <li class="pmn-list"><a href="#">Women</a></li>
                <li class="pmn-list"><a href="#">Collections</a></li>
                <li class="pmn-list pmn-has-dropdown">
                    <a href="#">Editorial <span class="sub-arrow"></span></a>
                    <ul class="pmn-dropdown">
                        <li class="pmn-dropdown-list"><a href="#">A.S.C</a></li>
                        <li class="pmn-dropdown-list"><a href="#">BAZAAR</a></li>
                        <li class="pmn-dropdown-list"><a href="#">ELLE</a></li>
                        <li class="pmn-dropdown-list"><a href="#">GQ</a></li>
                    </ul>
                </li>
                <li class="pmn-list"><a href="#">News</a></li>
                <li class="pmn-list"><a href="#">Stories</a></li>
            </ul>
            <img src="./media/logo.svg" class="pmn-mobile-logo" alt="Plaimanas Logo">
        </div>
        <!-- menu : end -->
        <!-- sign in : start -->
         <div id="menuSignin" class="pmn-auth">
            <a href="#" class="pmn-signin">Sign in</a>
            <button class="bag-btn">
                <svg class="i i-bag-shopping" viewBox="0 0 24 24">
                    <path d="M3 7v11a4 4 0 0 0 4 4h10a4 4 0 0 0 4-4V7Zm13 3V6a4 4 0 0 0-8 0v4"></path>
                </svg>
            </button>
        </div>
        <!-- sign in : end -->
    </nav>
    <!-- Top Navigation : end -->
    <script src="script.js"></script>
</body>
</html>
